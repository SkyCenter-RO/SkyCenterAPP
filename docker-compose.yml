services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_URL: http://localhost:${APP_PORT:-8080}
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-skycenter_app}
      DB_USERNAME: ${DB_USERNAME:-skycenter}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${APP_PORT:-8080}:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      pgsql:
        condition: service_healthy

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-skycenter_app}
      POSTGRES_USER: ${DB_USERNAME:-skycenter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${FORWARD_DB_PORT:-55433}:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-database.sh:/docker-entrypoint-initdb.d/10-init-test-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-skycenter} -d ${DB_DATABASE:-skycenter_app}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgsql-data:
